name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_pgsql, pgsql, mbstring, intl, exif, bcmath, gd, zip
          tools: composer:v2, rector
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Cache vendor directory
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php82-vendor-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Dump Composer autoload
        run: composer dump-autoload --optimize

      - name: Validate composer metadata
        run: composer validate --strict

      - name: Run quality guard tests
        run: php artisan test tests/Feature/QualityGateDependencyHygieneTest.php tests/Feature/ArchitectureBoundaryGuardTest.php --colors=never

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Validate secure headers configuration
        run: php artisan security:check-headers

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U sail; then
              exit 0
            fi

            echo "Waiting for PostgreSQL..."
            sleep 2
          done

          echo "PostgreSQL did not become ready in time."
          exit 1

      - name: Enable PostGIS extension
        env:
          PGPASSWORD: password
        run: psql -h localhost -p 5432 -U sail -d testing -c "CREATE EXTENSION IF NOT EXISTS postgis;"

      - name: Prepare parallel test databases
        env:
          PGPASSWORD: password
        run: |
          for i in 1 2 3 4; do
            db_name="testing_test_${i}"
            psql -h localhost -p 5432 -U sail -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='${db_name}'" | grep -q 1 || psql -h localhost -p 5432 -U sail -d postgres -c "CREATE DATABASE ${db_name};"
            psql -h localhost -p 5432 -U sail -d "${db_name}" -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          done

      - name: Run migrations
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: sail
          DB_PASSWORD: password
        run: php artisan migrate --force

      - name: Run Laravel Pint
        run: ./vendor/bin/pint --test

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --configuration=phpstan.neon --no-progress --memory-limit=1G

      - name: Run staged PHPStan level 6 gate
        run: composer quality:phpstan-stage6

      - name: Run Rector dry-run gate
        run: composer quality:rector-dry-run

  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_pgsql, pgsql, mbstring, intl, exif, bcmath, gd, zip
          tools: composer:v2
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Cache vendor directory
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php82-vendor-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Dump Composer autoload
        run: composer dump-autoload --optimize

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U sail; then
              exit 0
            fi

            echo "Waiting for PostgreSQL..."
            sleep 2
          done

          echo "PostgreSQL did not become ready in time."
          exit 1

      - name: Enable PostGIS extension
        env:
          PGPASSWORD: password
        run: psql -h localhost -p 5432 -U sail -d testing -c "CREATE EXTENSION IF NOT EXISTS postgis;"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies and build
        run: |
          npm ci --no-progress
          npm run build --no-progress

      - name: Run tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: sail
          DB_PASSWORD: password
        run: ./vendor/bin/pest --parallel --colors=never
